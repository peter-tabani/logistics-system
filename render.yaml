# Render Blueprint — deploys the Stan backend + a Postgres database so the app
# works from ANY network (no PC, no Wi-Fi, no IP juggling).
#
# How to use:
#   1. Push this repo to GitHub.
#   2. On https://render.com (free), New → Blueprint → pick this repo.
#   3. After it deploys, open a Shell on the web service and run once:
#        npm run db:init && npm run db:seed && npm run db:seed:demo
#   4. Copy the service URL (e.g. https://stan-backend.onrender.com) and set it
#      in the app's login → "Server settings". Done — works everywhere.
#
# JWT_SECRET is generated by Render; DATABASE_URL is injected from the DB.
# No secrets are committed here.

services:
  - type: web
    name: stan-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stan-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: stan-db
    plan: free
